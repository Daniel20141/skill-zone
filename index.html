<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Skill Zone</title>
<style>
body{font-family:Arial;margin:0;background:#0f172a;color:white}
header{text-align:center;padding:30px;background:#020617}
h1{margin:0;font-size:40px}
input{padding:10px;width:80%;max-width:400px;border-radius:8px;border:none;margin-top:10px}
.container{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;padding:20px}
.card{background:#1e293b;border-radius:12px;overflow:hidden;cursor:pointer;transition:0.3s}
.card:hover{transform:scale(1.07)}
.card img{width:100%;height:220px;object-fit:cover}
.card h3{text-align:center;padding:10px}
.popup{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:none;justify-content:center;align-items:center}
.popup-content{background:white;color:black;padding:20px;border-radius:12px;max-width:500px;text-align:center}
button{padding:10px 15px;border:none;background:#0f172a;color:white;border-radius:6px;cursor:pointer}
form{background:#1e293b;padding:20px;margin:20px;border-radius:12px;text-align:center}
footer{text-align:center;padding:20px;background:#020617}
</style>
</head>
<body>

<header>
<h1>Skill Zone</h1>
<p>Elite Coaching Programme</p>
<input type="text" id="search" placeholder="Search coaches..." onkeyup="filterCoaches()">
</header>

<div class="container" id="coachList">

<div class="card" data-name="daniel" onclick="showInfo('Coach Daniel', coach1)">
<img src="https://images.unsplash.com/photo-1544723795-3fb6469f5b39">
<h3>Coach Daniel</h3>
</div>

<div class="card" data-name="amina" onclick="showInfo('Coach Amina', coach2)">
<img src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e">
<h3>Coach Amina</h3>
</div>

<div class="card" data-name="marcus" onclick="showInfo('Coach Marcus', coach3)">
<img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e">
<h3>Coach Marcus</h3>
</div>

<div class="card" data-name="sofia" onclick="showInfo('Coach Sofia', coach4)">
<img src="https://images.unsplash.com/photo-1544005313-94ddf0286df2">
<h3>Coach Sofia</h3>
</div>

<div class="card" data-name="ibrahim" onclick="showInfo('Coach Ibrahim', coach5)">
<img src="https://images.unsplash.com/photo-1531427186611-ecfd6d936c79">
<h3>Coach Ibrahim</h3>
</div>

<div class="card" data-name="chloe" onclick="showInfo('Coach Chloe', coach6)">
<img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330">
<h3>Coach Chloe</h3>
</div>

</div>

<div class="popup" id="popup">
<div class="popup-content">
<h2 id="title"></h2>
<p id="description"></p>
<button onclick="closePopup()">Close</button>
</div>
</div>

<form>
<h2>Contact Us</h2>
<p>Interested? Message Avi-Cenna</p>
<input type="text" placeholder="Your Name" required><br><br>
<input type="email" placeholder="Your Email" required><br><br>
<textarea placeholder="Your Message" rows="4" style="width:80%;max-width:400px"></textarea><br><br>
<button type="submit">Send</button>
</form>

<footer>
<p>Contact Avi-Cenna School for enrollment</p>
<p>7A - Rising Stars™</p>
</footer>

<script>
const coach1="Coach Daniel is a top football trainer with elite-level experience. He focuses on tactics, fitness, and discipline. Many of his players improve rapidly and compete at high levels.";
const coach2="Coach Amina is a speed and athletics expert. She builds endurance, sprinting skills, and confidence in athletes.";
const coach3="Coach Marcus teaches basketball fundamentals and advanced skills, turning beginners into strong players.";
const coach4="Coach Sofia is a professional swimming instructor focusing on technique and competition training.";
const coach5="Coach Ibrahim builds strength, power, and agility through intense training programs.";
const coach6="Coach Chloe helps students discover their best sport and develop confidence while improving skills.";

function showInfo(name,text){
document.getElementById('title').innerText=name;
document.getElementById('description').innerText=text+"\n\nContact Avi-Cenna School to join.";
document.getElementById('popup').style.display='flex';}

function closePopup(){document.getElementById('popup').style.display='none';}

function filterCoaches(){
let input=document.getElementById('search').value.toLowerCase();
let cards=document.getElementsByClassName('card');
for(let i=0;i<cards.length;i++){
let name=cards[i].getAttribute('data-name');
cards[i].style.display=name.includes(input)?'block':'none';}}
</script>

</body>
</html>
